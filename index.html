<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Interactive Web Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #f5f5f5;
      display: flex;
      min-height: 100vh;
      justify-content: center;
      align-items: flex-start;
      padding-top: 10px;
      box-sizing: border-box;
    }

    .app-container {
      width: 100%;
      max-width: 1120px;
      padding: clamp(10px, 2vw, 24px);
      box-sizing: border-box;
    }

    .step { display: none; }
    .step.active { display: block; }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid #333;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .btn {
      display: inline-block;
      margin-top: 8px;
      padding: 10px 20px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: #f5f5f5;
      color: #111;
      font-size: 14px;
      font-weight: 600;
      max-width: 100%;
    }

    .btn[disabled] {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .quiz-option {
      margin: 1px 0;
      display: block;
      font-size: clamp(15px, 1.8vw, 18px);
      line-height: 1.35;
    }

    .quiz-card {
      background: #181818;
      border-radius: 16px;
      padding: clamp(14px, 1.8vw, 20px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.45);
      max-width: 980px;
      min-height: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .quiz-card .btn {
      margin-bottom: 0;
    }

    .quiz-card h3 {
      font-size: clamp(21px, 2.8vw, 28px);
      line-height: 1.15;
      margin: 0;
    }

    .quiz-image {
      width: 100%;
      max-width: none;
      height: auto;
      max-height: min(34vh, 340px);
      display: block;
      margin: 0 0 4px 0;
      border-radius: 14px;
      border: 1px solid #333;
      object-fit: contain;
      background: #101010;
      opacity: 1;
      transform: scale(1);
      transition: opacity 0.32s ease, transform 0.32s ease;
    }

    .quiz-image.is-fading {
      opacity: 0.12;
      transform: scale(0.992);
    }

    .message {
      margin-top: 2px;
      min-height: 0;
      font-size: clamp(14px, 1.6vw, 16px);
      line-height: 1.5;
      padding: 9px 11px;
      border-radius: 12px;
      background: #141414;
      border: 1px solid #2d2d2d;
    }

    .message:empty {
      display: none;
    }

    .message.correct {
      color: #b6f0b2;
      border-color: #35543a;
      background: rgba(46, 77, 52, 0.25);
    }

    .message.wrong {
      color: #ffb3b3;
      border-color: #5a3434;
      background: rgba(95, 54, 54, 0.18);
    }

    .slide-in-right {
      animation: slideInRight 0.35s ease-out forwards;
    }

    .slide-out-left {
      animation: slideOutLeft 0.35s ease-in forwards;
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(40px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideOutLeft {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(-40px); }
    }

    .quiz-card.shake {
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-6px); }
      40%  { transform: translateX(6px); }
      60%  { transform: translateX(-4px); }
      80%  { transform: translateX(4px); }
      100% { transform: translateX(0); }
    }

    p {
      font-size: clamp(15px, 1.8vw, 16px);
    }

    #step1 p,
    #step3 p {
      font-size: clamp(16px, 2vw, 18px);
      margin: 0 0 14px 0;
    }

    /* Step 4 */
    .hazard-step {
      max-width: 940px;
      margin: 0 auto;
    }

    .hazard-question {
      font-size: clamp(24px, 3.2vw, 30px);
      line-height: 1.15;
      margin: 0 0 10px 0;
    }

    .hazard-image-wrapper {
      position: relative;
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #333;
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
      background: #181818;
    }

    .hazard-main-image {
      width: 100%;
      height: auto;
      display: block;
    }

    .hazard-hotspot {
      position: absolute;
      background: transparent;
      border: none;
      cursor: default;
    }

    .hazard-hotspot.found-flash {
      animation: foundFlash 0.8s ease;
    }

    @keyframes foundFlash {
      0% {
        background: rgba(255, 230, 120, 0);
        box-shadow: 0 0 0 rgba(255, 230, 120, 0);
      }
      25% {
        background: rgba(255, 230, 120, 0.38);
        box-shadow: 0 0 0 2px rgba(255, 230, 120, 0.55) inset;
      }
      100% {
        background: rgba(255, 230, 120, 0);
        box-shadow: 0 0 0 rgba(255, 230, 120, 0);
      }
    }

    .hazard-found-bar {
      margin-top: 8px;
      padding: 12px 16px;
      background: #181818;
      border: 1px solid #333;
      border-radius: 14px;
    }

    .hazard-found-top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 16px;
      margin-bottom: 10px;
    }

    .hazard-progress {
      font-size: 16px;
      font-weight: 700;
    }

    .hazard-helper {
      font-size: 14px;
      line-height: 1.4;
      color: #c9c9c9;
    }

    .hazard-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .hazard-tag-empty {
      font-size: 14px;
      color: #c9c9c9;
      line-height: 1.4;
    }

    .hazard-tag {
      display: inline-flex;
      align-items: center;
      padding: 8px 10px;
      border-radius: 999px;
      background: #232323;
      border: 1px solid #3a3a3a;
      font-size: 13px;
      line-height: 1.3;
      animation: tagFadeIn 0.28s ease;
    }

    @keyframes tagFadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      body {
        padding-top: 0;
        align-items: stretch;
      }

      .app-container {
        padding: 10px 12px 16px;
      }

      .quiz-card {
        padding: 14px;
        border-radius: 14px;
      }

      .quiz-image {
        max-height: 28vh;
      }

      .btn {
        width: 100%;
        text-align: center;
      }

      .hazard-found-top {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (max-height: 900px) {
      .quiz-card {
        padding: 14px 16px 16px;
        gap: 6px;
      }

      .quiz-image {
        max-height: 26vh;
        margin-bottom: 2px;
      }

      .quiz-card h3 {
        font-size: clamp(20px, 2.2vw, 24px);
      }

      .quiz-option {
        font-size: 15px;
        line-height: 1.3;
        margin: 0;
      }

      .btn {
        margin-top: 4px;
        padding: 9px 18px;
      }

      .message {
        font-size: 14px;
        line-height: 1.45;
        padding: 8px 10px;
      }
    }

    @media (max-height: 760px) {
      .quiz-card {
        padding: 12px 14px 14px;
        gap: 4px;
      }

      .quiz-image {
        max-height: 20vh;
      }

      .quiz-card h3 {
        font-size: clamp(18px, 2vw, 22px);
      }

      .quiz-option {
        font-size: 14px;
      }

      .btn {
        padding: 8px 16px;
        font-size: 13px;
      }

      .message {
        font-size: 13px;
        line-height: 1.4;
        padding: 7px 9px;
      }
    }
  </style>
</head>

<body>
<div class="app-container">

  <!-- Step 1 -->
  <section id="step1" class="step active">
    <p>Please watch the video.</p>

    <div class="video-wrapper">
      <div id="player1"></div>
    </div>
  </section>

  <!-- Step 2 -->
  <section id="step2" class="step">

    <!-- Q1 -->
    <div id="cardQ1" class="quiz-card">
      <img id="q1MainImage" class="quiz-image" src="question1.png" alt="Question 1 image">

      <h3>The bin is on fire. Where should you find the nearest fire extinguisher?</h3>

      <label class="quiz-option"><input type="radio" name="quiz1" value="A"> A. At the information desk</label>
      <label class="quiz-option"><input type="radio" name="quiz1" value="B"> B. At the nearest food stalls</label>
      <label class="quiz-option"><input type="radio" name="quiz1" value="C"> C. At the market stalls</label>

      <button class="btn" id="checkQ1">Check Answer</button>
      <div class="message" id="msgQ1"></div>
    </div>

    <!-- Q2 -->
    <div id="cardQ2" class="quiz-card" style="display:none;">
      <img id="q2MainImage" class="quiz-image" src="question2.png" alt="Question 2 image">

      <h3>Which one is needed?</h3>

      <label class="quiz-option"><input type="radio" name="quiz2" value="A"> Water</label>
      <label class="quiz-option"><input type="radio" name="quiz2" value="B"> CO₂</label>
      <label class="quiz-option"><input type="radio" name="quiz2" value="C"> Foam</label>

      <button class="btn" id="checkQ2">Check Answer</button>
      <div class="message" id="msgQ2"></div>
    </div>
  </section>

  <!-- Step 3 -->
  <section id="step3" class="step">
    <p>Please watch the video.</p>

    <div class="video-wrapper">
      <div id="player2"></div>
    </div>
  </section>

  <!-- Step 4 -->
  <section id="step4" class="step">
    <div class="hazard-step">
      <h3 class="hazard-question">What hazards could you find on this photo?</h3>

      <div class="hazard-image-wrapper">
        <img src="question3-scene.png" alt="Hazard scene" class="hazard-main-image">

        <!-- 1. A sign falling off a tent -->
        <div class="hazard-hotspot"
             data-id="tent-sign"
             data-answer="A sign falling off a tent"
             style="top: 23%; left: 29%; width: 17%; height: 40%;"></div>

        <!-- 2. A car blocking a fire exit -->
        <div class="hazard-hotspot"
             data-id="fire-exit-car"
             data-answer="A car blocking a fire exit"
             style="top: 14%; left: 45%; width: 41%; height: 39%;"></div>

        <!-- 3. A pile of rubbish -->
        <div class="hazard-hotspot"
             data-id="rubbish-pile"
             data-answer="A pile of rubbish"
             style="top: 58%; left: 31%; width: 48%; height: 35%;"></div>

        <!-- 4. A person without a hi-vis on -->
        <div class="hazard-hotspot"
             data-id="no-hi-vis"
             data-answer="A person without a hi-vis on"
             style="top: 46%; left: 84%; width: 11%; height: 28%;"></div>
      </div>

      <div class="hazard-found-bar">
        <div class="hazard-found-top">
          <div class="hazard-progress">Found: <span id="hazardFoundCount">0</span> / 4</div>
          <div class="hazard-helper">Click on the image to find the hazards.</div>
        </div>

        <div class="hazard-tags" id="hazardTags">
          <div class="hazard-tag-empty" id="hazardEmptyState">No hazards found yet.</div>
        </div>
      </div>
    </div>
  </section>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player1, player2;

const VIDEO_1_ID = "b6ZODrjBjOM";
const VIDEO_2_ID = "PQV71INDaqY";

const resetTimers = {
  quiz1: null,
  quiz2: null
};

function showStep(num) {
  document.querySelectorAll(".step").forEach((s, i) => {
    s.classList.toggle("active", i === num - 1);
  });
}

function onYouTubeIframeAPIReady() {
  player1 = new YT.Player("player1", {
    videoId: VIDEO_1_ID,
    events: {
      onStateChange: e => {
        if (e.data === YT.PlayerState.ENDED) showStep(2);
      }
    }
  });

  player2 = new YT.Player("player2", {
    videoId: VIDEO_2_ID,
    events: {
      onStateChange: e => {
        if (e.data === YT.PlayerState.ENDED) showStep(4);
      }
    }
  });
}

function shake(card) {
  card.classList.remove("shake");
  void card.offsetWidth;
  card.classList.add("shake");
}

function fadeSwapImage(imgElement, newSrc, newAlt) {
  imgElement.classList.add("is-fading");
  imgElement.src = newSrc;
  imgElement.alt = newAlt;

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      imgElement.classList.remove("is-fading");
    });
  });
}

function setInputsDisabled(quizName, disabled) {
  document.querySelectorAll(`input[name="${quizName}"]`).forEach(input => {
    input.disabled = disabled;
  });
}

function clearQuizTimer(quizKey) {
  if (resetTimers[quizKey]) {
    clearTimeout(resetTimers[quizKey]);
    resetTimers[quizKey] = null;
  }
}

const cardQ1 = document.getElementById("cardQ1");
const cardQ2 = document.getElementById("cardQ2");

const quizConfig = {
  quiz1: {
    questionSrc: "question1.png",
    questionAlt: "Question 1 image",
    mainImageId: "q1MainImage",
    checkButtonId: "checkQ1",
    messageId: "msgQ1",
    correct: "B",
    options: {
      A: { src: "info-tent.png", alt: "Information desk" },
      B: { src: "catering-stall.png", alt: "Nearest food stalls" },
      C: { src: "market-stalls.png", alt: "Market stalls" }
    }
  },
  quiz2: {
    questionSrc: "question2.png",
    questionAlt: "Question 2 image",
    mainImageId: "q2MainImage",
    checkButtonId: "checkQ2",
    messageId: "msgQ2",
    correct: "A",
    options: {
      A: { src: "water.png", alt: "Water" },
      B: { src: "co2.png", alt: "CO2" },
      C: { src: "foam.png", alt: "Foam" }
    }
  }
};

function lockQuiz(quizKey, locked) {
  const config = quizConfig[quizKey];
  document.getElementById(config.checkButtonId).disabled = locked;
  setInputsDisabled(quizKey, locked);
}

function goToQuestion2() {
  cardQ1.classList.remove("slide-in-right");
  cardQ1.classList.add("slide-out-left");

  setTimeout(() => {
    cardQ1.style.display = "none";
    cardQ2.style.display = "block";
    cardQ2.classList.remove("slide-out-left");
    cardQ2.classList.add("slide-in-right");
  }, 500);
}

function handleQuizCheck(quizKey, cardElement) {
  const config = quizConfig[quizKey];
  const selected = document.querySelector(`input[name="${quizKey}"]:checked`);
  const msg = document.getElementById(config.messageId);
  const mainImage = document.getElementById(config.mainImageId);

  clearQuizTimer(quizKey);

  if (!selected) {
    msg.textContent = "Please select an option.";
    msg.className = "message wrong";
    shake(cardElement);
    return;
  }

  const choice = config.options[selected.value];
  fadeSwapImage(mainImage, choice.src, choice.alt);

  if (selected.value === config.correct) {
    if (quizKey === "quiz1") {
      msg.innerHTML = `
        <strong>Correct.</strong> Every food stall at an event site is required to have a fire extinguisher on hand.<br><br>
        Because catering involves heat, flames and cooking equipment, it's one of the highest-risk
        areas on any event site – so it's also one of the first places you'll find the right equipment.
      `;
    } else {
      msg.textContent = "Correct!";
    }

    msg.className = "message correct";
    lockQuiz(quizKey, true);

    resetTimers[quizKey] = setTimeout(() => {
      if (quizKey === "quiz1") {
        goToQuestion2();
      } else if (quizKey === "quiz2") {
        showStep(3);
        player2.playVideo();
      }
    }, quizKey === "quiz1" ? 6000 : 3000);

    return;
  }

  msg.textContent = "Wrong. Try again!";
  msg.className = "message wrong";
  lockQuiz(quizKey, true);
  shake(cardElement);

  resetTimers[quizKey] = setTimeout(() => {
    fadeSwapImage(mainImage, config.questionSrc, config.questionAlt);

    setTimeout(() => {
      lockQuiz(quizKey, false);
    }, 180);
  }, 3000);
}

document.getElementById("checkQ1").onclick = () => {
  handleQuizCheck("quiz1", cardQ1);
};

document.getElementById("checkQ2").onclick = () => {
  handleQuizCheck("quiz2", cardQ2);
};

/* Step 4 */
const hazardFoundCount = document.getElementById("hazardFoundCount");
const hazardTags = document.getElementById("hazardTags");
const hazardEmptyState = document.getElementById("hazardEmptyState");

const foundHazards = new Set();
const hazardOrder = [
  { id: "tent-sign", text: "A sign falling off a tent" },
  { id: "fire-exit-car", text: "A car blocking a fire exit" },
  { id: "rubbish-pile", text: "A pile of rubbish" },
  { id: "no-hi-vis", text: "A person without a hi-vis on" }
];

function renderHazardTags() {
  const foundItems = hazardOrder.filter(item => foundHazards.has(item.id));

  hazardFoundCount.textContent = foundItems.length;
  hazardTags.innerHTML = "";

  if (foundItems.length === 0) {
    hazardTags.appendChild(hazardEmptyState);
    return;
  }

  foundItems.forEach(item => {
    const tag = document.createElement("div");
    tag.className = "hazard-tag";
    tag.textContent = item.text;
    hazardTags.appendChild(tag);
  });
}

function flashFoundHotspot(hotspot) {
  hotspot.classList.remove("found-flash");
  void hotspot.offsetWidth;
  hotspot.classList.add("found-flash");
}

document.addEventListener("click", ev => {
  const hs = ev.target.closest(".hazard-hotspot");
  if (!hs) return;

  const hazardId = hs.dataset.id;

  if (!foundHazards.has(hazardId)) {
    foundHazards.add(hazardId);
    flashFoundHotspot(hs);
    renderHazardTags();
  }
});
</script>

</body>
</html>

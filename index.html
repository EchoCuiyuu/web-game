<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Interactive Web Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #f5f5f5;
      display: flex;
      min-height: 100vh;
      justify-content: center;
      align-items: center;
    }

    .app-container {
      width: 100%;
      max-width: 1100px;
      padding: 24px;
      box-sizing: border-box;
    }

    .step { display: none; }
    .step.active { display: block; }

    /* Step 2 整体上移 */
    #step2 {
      margin-top: -36px;
    }

    /* 视频 */
    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid #333;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* 按钮 */
    .btn {
      display: inline-block;
      margin-top: 16px;
      margin-right: 12px;
      padding: 10px 20px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: #f5f5f5;
      color: #111;
      font-size: 14px;
      font-weight: 600;
    }

    .btn[disabled] {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* quiz */
    .quiz-option {
      margin: 8px 0;
      display: block;
      font-size: 18px;
    }

    .quiz-card {
      background: #181818;
      border-radius: 16px;
      padding: 22px 24px 28px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.45);
      max-width: 980px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .quiz-card .btn {
      margin-bottom: 16px;
    }

    .quiz-card h3 {
      font-size: 28px;
      margin: 0 0 18px 0;
    }

    /* 顶部主图：几乎铺满卡片 */
    .quiz-image {
      width: 100%;
      max-width: none;
      height: auto;
      display: block;
      margin: 0 0 24px 0;
      border-radius: 14px;
      border: 1px solid #333;
      object-fit: cover;
      opacity: 1;
      transform: scale(1);
      transition: opacity 0.32s ease, transform 0.32s ease;
    }

    .quiz-image.is-fading {
      opacity: 0.12;
      transform: scale(0.992);
    }

    /* 反馈文字 */
    .message {
      margin-top: 6px;
      min-height: 32px;
      font-size: 16px;
      line-height: 1.4;
    }

    .message.correct {
      color: #b6f0b2;
    }

    .message.wrong {
      color: #ffb3b3;
    }

    /* 滑动效果 */
    .slide-in-right {
      animation: slideInRight 0.35s ease-out forwards;
    }

    .slide-out-left {
      animation: slideOutLeft 0.35s ease-in forwards;
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(40px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideOutLeft {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(-40px); }
    }

    /* 错误抖动 */
    .quiz-card.shake {
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-6px); }
      40%  { transform: translateX(6px); }
      60%  { transform: translateX(-4px); }
      80%  { transform: translateX(4px); }
      100% { transform: translateX(0); }
    }

    /* hotspot 区域（完全隐形） */
    .hotspot {
      position: absolute;
      border-radius: 999px;
      background: transparent;
      border: none;
      cursor: pointer;
    }

    /* 放大镜层 */
    #magnifier {
      position: absolute;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      pointer-events: none;
      border: 2px solid #fff;
      box-shadow: 0 0 15px rgba(0,0,0,0.6);
      display: none;
      background-repeat: no-repeat;
      overflow: hidden;
      z-index: 5;
    }

    /* hotspot 区域布局 */
    .image-hotspot-container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .image-wrapper {
      position: relative;
      flex: 1 1 300px;
      max-width: 500px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #333;
    }

    .image-wrapper img {
      width: 100%;
      height: auto;
      display: block;
    }

    .hotspot-info {
      flex: 1 1 200px;
      min-width: 220px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #333;
      background: #181818;
      font-size: 14px;
      line-height: 1.5;
    }

    .hotspot-info-title {
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 15px;
    }

    .step-indicator {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #aaa;
      margin-bottom: 8px;
    }

    h2 {
      font-size: 32px;
      margin: 0 0 22px 0;
    }

    p {
      font-size: 16px;
    }
  </style>
</head>

<body>
<div class="app-container">

  <!-- Step 1 -->
  <section id="step1" class="step active">
    <div class="step-indicator">Step 1 / 4</div>
    <h2>Video 1</h2>
    <p>Please watch the video.</p>

    <div class="video-wrapper">
      <div id="player1"></div>
    </div>
  </section>

  <!-- Step 2 -->
  <section id="step2" class="step">

    <!-- Q1 -->
    <div id="cardQ1" class="quiz-card">
      <img id="q1MainImage" class="quiz-image" src="question1.png" alt="Question 1 image">

      <h3>Where are the fire extinguishers?</h3>

      <label class="quiz-option"><input type="radio" name="quiz1" value="A"> A. Catering stalls</label>
      <label class="quiz-option"><input type="radio" name="quiz1" value="B"> B. Info tent</label>
      <label class="quiz-option"><input type="radio" name="quiz1" value="C"> C. Market stalls</label>

      <button class="btn" id="checkQ1">Check Answer</button>
      <button class="btn" id="quizNextBtnQ1" disabled>Next ▶</button>
      <div class="message" id="msgQ1"></div>
    </div>

    <!-- Q2 -->
    <div id="cardQ2" class="quiz-card" style="display:none; margin-top:30px;">
      <img id="q2MainImage" class="quiz-image" src="question2.png" alt="Question 2 image">

      <h3>Which one is needed?</h3>

      <label class="quiz-option"><input type="radio" name="quiz2" value="A"> Water</label>
      <label class="quiz-option"><input type="radio" name="quiz2" value="B"> CO₂</label>
      <label class="quiz-option"><input type="radio" name="quiz2" value="C"> Foam</label>

      <button class="btn" id="checkQ2">Check Answer</button>
      <button class="btn" id="quizNextBtn" disabled>Next ▶</button>
      <div class="message" id="msgQ2"></div>
    </div>
  </section>

  <!-- Step 3 -->
  <section id="step3" class="step">
    <div class="step-indicator">Step 3 / 4</div>
    <h2>Video 2</h2>
    <div class="video-wrapper"><div id="player2"></div></div>
  </section>

  <!-- Step 4 -->
  <section id="step4" class="step">
    <div class="step-indicator">Step 4 / 4</div>
    <h2>Interactive Image</h2>

    <div class="image-hotspot-container">
      <div class="image-wrapper">
        <img src="market-scene.png" alt="Scene">

        <div class="hotspot" data-title="Info tent staff"
             data-description="The info tent staff help visitors with directions, safety information and emergency procedures."
             style="top: 20%; left: 15%; width: 20%; height: 30%;"></div>

        <div class="hotspot" data-title="Market stall vendor"
             data-description="The market stall vendor sells fresh produce."
             style="top: 18%; left: 60%; width: 20%; height: 28%;"></div>

        <div class="hotspot" data-title="Catering stall worker"
             data-description="Catering stalls involve cooking and open flames."
             style="top: 59%; left: 73%; width: 11%; height: 28%;"></div>

        <div class="hotspot" data-title="Water bottle"
             data-description="Staying hydrated is important."
             style="top: 48%; left: 45%; width: 10%; height: 28%;"></div>

        <div class="hotspot" data-title="Fire extinguisher"
             data-description="Every catering stall should have a fire extinguisher."
             style="top: 58%; left: 61%; width: 5%; height: 26%;"></div>

        <div id="magnifier"></div>
      </div>

      <div class="hotspot-info" id="hotspotInfo">
        <div class="hotspot-info-title">Hint</div>
        Click on the hotspots.
      </div>
    </div>
  </section>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player1, player2;

const VIDEO_1_ID = "rR9HqxVLosw";
const VIDEO_2_ID = "TAoYnAJLXoQ";

const resetTimers = {
  quiz1: null,
  quiz2: null
};

function showStep(num) {
  document.querySelectorAll(".step").forEach((s, i) => {
    s.classList.toggle("active", i === num - 1);
  });
}

function onYouTubeIframeAPIReady() {
  player1 = new YT.Player("player1", {
    videoId: VIDEO_1_ID,
    events: {
      onStateChange: e => {
        if (e.data === YT.PlayerState.ENDED) showStep(2);
      }
    }
  });

  player2 = new YT.Player("player2", {
    videoId: VIDEO_2_ID,
    events: {
      onStateChange: e => {
        if (e.data === YT.PlayerState.ENDED) showStep(4);
      }
    }
  });
}

function shake(card) {
  card.classList.remove("shake");
  void card.offsetWidth;
  card.classList.add("shake");
}

function fadeSwapImage(imgElement, newSrc, newAlt, duration = 320) {
  imgElement.classList.add("is-fading");

  setTimeout(() => {
    imgElement.src = newSrc;
    imgElement.alt = newAlt;
    imgElement.classList.remove("is-fading");
  }, duration);
}

function setInputsDisabled(quizName, disabled) {
  document.querySelectorAll(`input[name="${quizName}"]`).forEach(input => {
    input.disabled = disabled;
  });
}

const cardQ1 = document.getElementById("cardQ1");
const cardQ2 = document.getElementById("cardQ2");
const nextQ1 = document.getElementById("quizNextBtnQ1");

const quizConfig = {
  quiz1: {
    questionSrc: "question1.png",
    questionAlt: "Question 1 image",
    mainImageId: "q1MainImage",
    checkButtonId: "checkQ1",
    nextButtonId: "quizNextBtnQ1",
    messageId: "msgQ1",
    correct: "A",
    options: {
      A: { src: "catering-stall.png", alt: "Catering stalls" },
      B: { src: "info-tent.png", alt: "Info tent" },
      C: { src: "market-stalls.png", alt: "Market stalls" }
    }
  },
  quiz2: {
    questionSrc: "question2.png",
    questionAlt: "Question 2 image",
    mainImageId: "q2MainImage",
    checkButtonId: "checkQ2",
    nextButtonId: "quizNextBtn",
    messageId: "msgQ2",
    correct: "A",
    options: {
      A: { src: "water.png", alt: "Water" },
      B: { src: "co2.png", alt: "CO2" },
      C: { src: "foam.png", alt: "Foam" }
    }
  }
};

function lockQuiz(quizKey, locked) {
  const config = quizConfig[quizKey];
  document.getElementById(config.checkButtonId).disabled = locked;
  setInputsDisabled(quizKey, locked);
}

function clearQuizTimer(quizKey) {
  if (resetTimers[quizKey]) {
    clearTimeout(resetTimers[quizKey]);
    resetTimers[quizKey] = null;
  }
}

function handleQuizCheck(quizKey, cardElement) {
  const config = quizConfig[quizKey];
  const selected = document.querySelector(`input[name="${quizKey}"]:checked`);
  const msg = document.getElementById(config.messageId);
  const mainImage = document.getElementById(config.mainImageId);
  const nextBtn = document.getElementById(config.nextButtonId);

  clearQuizTimer(quizKey);

  if (!selected) {
    msg.textContent = "Please select an option.";
    msg.className = "message wrong";
    shake(cardElement);
    return;
  }

  const choice = config.options[selected.value];
  fadeSwapImage(mainImage, choice.src, choice.alt);

  if (selected.value === config.correct) {
    msg.textContent = "Correct! Click Next.";
    msg.className = "message correct";
    lockQuiz(quizKey, true);
    nextBtn.disabled = false;
    return;
  }

  msg.textContent = "Wrong. Try again!";
  msg.className = "message wrong";
  nextBtn.disabled = true;
  lockQuiz(quizKey, true);
  shake(cardElement);

  resetTimers[quizKey] = setTimeout(() => {
    fadeSwapImage(mainImage, config.questionSrc, config.questionAlt);
    setTimeout(() => {
      lockQuiz(quizKey, false);
    }, 340);
  }, 3000);
}

document.getElementById("checkQ1").onclick = () => {
  handleQuizCheck("quiz1", cardQ1);
};

document.getElementById("quizNextBtnQ1").onclick = () => {
  clearQuizTimer("quiz1");
  cardQ1.classList.remove("slide-in-right");
  cardQ1.classList.add("slide-out-left");

  setTimeout(() => {
    cardQ1.style.display = "none";
    cardQ2.style.display = "block";
    cardQ2.classList.remove("slide-out-left");
    cardQ2.classList.add("slide-in-right");
  }, 500);
};

document.getElementById("checkQ2").onclick = () => {
  handleQuizCheck("quiz2", cardQ2);
};

document.getElementById("quizNextBtn").onclick = () => {
  clearQuizTimer("quiz2");
  showStep(3);
  player2.playVideo();
};

const image = document.querySelector("#step4 img");
const magnifier = document.getElementById("magnifier");
const hotspotInfo = document.getElementById("hotspotInfo");

document.addEventListener("click", ev => {
  const hs = ev.target.closest(".hotspot");
  if (!hs) return;

  hotspotInfo.innerHTML = `
    <div class="hotspot-info-title">${hs.dataset.title}</div>
    ${hs.dataset.description}
  `;

  const rect = image.getBoundingClientRect();
  const zoom = 2.2;
  const lens = 140;

  const x = ev.clientX - rect.left;
  const y = ev.clientY - rect.top;

  magnifier.style.display = "block";
  magnifier.style.left = (x - lens / 2) + "px";
  magnifier.style.top = (y - lens / 2) + "px";

  magnifier.style.backgroundImage = `url(${image.src})`;
  magnifier.style.backgroundSize = `${rect.width * zoom}px ${rect.height * zoom}px`;
  magnifier.style.backgroundPosition = `${-(x * zoom - lens / 2)}px ${-(y * zoom - lens / 2)}px`;
});
</script>

</body>
</html>
